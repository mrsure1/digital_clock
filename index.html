<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Clock</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="clock-container">
    <div id="clock-display" class="draggable">
      <div id="temp-display">--°C</div>

      <div id="time-wrapper">
        <span id="hours">00</span>
        <span id="separator">:</span>
        <span id="minutes">00</span>
      </div>

      <div id="ampm-indicator">
        <div id="am-row"><span class="dot"></span> 오전</div>
        <div id="pm-row"><span class="dot"></span> 오후</div>
      </div>

      <div id="controls-inline">
        <div id="close-btn">×</div>
        <button id="toggle-settings-btn" title="설정">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12c0,0.31,0.02,0.65,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94zM12,15.5c-1.93,0-3.5-1.57-3.5-3.5s1.57-3.5,3.5-3.5s3.5,1.57,3.5,3.5S13.93,15.5,12,15.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="settings-panel" class="collapsed">
      <div class="settings-group">
        <label>색상</label>
        <input type="color" id="color-picker" value="#ff4444">
      </div>
      <div class="settings-group">
        <label>밝기</label>
        <input type="range" id="brightness-slider" min="0.1" max="1" step="0.1" value="1">
      </div>
      <div class="settings-group">
        <label>투명도</label>
        <input type="range" id="bg-opacity-slider" min="0" max="1" step="0.05" value="0.85">
      </div>
      <div class="settings-group">
        <label>위치</label>
        <input type="text" id="city-input" placeholder="도시명 (예: Seoul)">
        <button id="save-city-btn">저장</button>
      </div>
      <div class="settings-group">
        <label>알람</label>
        <input type="time" id="alarm-time">
        <button id="set-alarm-btn">설정</button>
      </div>
      <div id="alarm-status">알람 없음</div>
      <div class="settings-group" style="margin-top: 20px; text-align: center;">
        <button id="close-settings-btn" class="primary-btn">설정 완료</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
